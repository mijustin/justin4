name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── PHP ─────────────────────────────────────────────────────────────────────
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, json, bcmath
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Check PHP syntax (app/)
        run: find app -name "*.php" | xargs -P4 php -l | grep -v "No syntax errors" || true

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Run tests
        run: php vendor/bin/phpunit --no-coverage

  # ── Security ─────────────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHP vulnerability audit
        # continue-on-error while existing vulnerabilities are being resolved via Dependabot
        continue-on-error: true
        run: composer audit --no-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: npm vulnerability audit (high/critical only)
        run: npm audit --audit-level=high --production
